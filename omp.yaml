# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 3
palette:
  aqua: "#8ec07c"
  blue: "#83a698"
  fg: "#ebdbb2"
  gray: "#a89984"
  purple: "#d3869b"
  red: "#cc241d"
  white: "#fbf1c7"
secondary_prompt:
  template: "❯❯ "
  foreground_templates:
    - "{{if gt .Code 0}}p:red{{end}}"
    - "{{if eq .Code 0}}p:fg{{end}}"
transient_prompt:
  template: "\n{{ now | date \"15:04:05\" }}❯ "
  foreground_templates:
    - "{{if gt .Code 0}}p:red{{end}}"
    - "{{if eq .Code 0}}p:fg{{end}}"
blocks:
  - type: prompt
    alignment: left
    overflow: hidden
    segments:
      - options:
          cache_duration: none
          style: full
        template: "\n{{ .Path }} "
        foreground: p:fg
        type: path
        style: plain
        newline: true
      - options:
          branch_icon: "\uf126 "
          branch_max_length: 25
          cache_duration: none
          commit_icon: "@"
          fetch_status: true
          full_branch_path: true
        foreground: p:purple
        type: git
        style: plain
        templates:
          - "{{ .HEAD }} "
          - "{{ if .Staging.Changed }}\uf067{{ end }}{{ if gt .Working.Untracked 0 }}?{{ else if .Working.Changed }}!{{ end }}{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}{{ if gt .StashCount 0 }}\uf51e{{ end }} "
      - options:
          cache_duration: none
        template: "{{ .Env.POSH_LOCAL_CONTEXT }}"
        foreground: p:blue
        type: text
        style: plain
      - options:
          cache_duration: none
          threshold: 1000
        template: "{{ .FormattedMs }} "
        foreground: p:gray
        type: executiontime
        style: plain
  - type: prompt
    alignment: left
    segments:
      - options:
          cache_duration: none
        template: "❯ "
        type: text
        style: plain
        foreground_templates:
          - "{{if eq .Code 0}}white{{end}}"
          - "{{if gt .Code 0}}p:red{{end}}"
    newline: true
tooltips:
  - options:
      display_default: true
    template:  {{ .Profile }}
    foreground: p:aqua
    type: aws
    style: plain
    tips:
      - aws
      - terraform
  - template: "\uf2f4 {{.Context}}{{if .Namespace}}/{{.Namespace}}{{end}} "
    foreground: p:aqua
    type: kubectl
    style: plain
    tips:
      - k
      - kubectl
  - template: "\uf1a0 {{.Project}} "
    foreground: p:aqua
    type: gcp
    style: plain
    tips:
      - gcp
